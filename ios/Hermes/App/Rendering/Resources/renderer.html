<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Hermes</title>
  <link rel="stylesheet" href="hermes-mobile.css">
  <!-- Fast: load markdown + code highlight from public CDNs. The on-device
       renderer has no service worker; the OS networks are good enough that we
       don't pay a meaningful startup cost. If you ever turn on offline mode,
       copy these JS files into Resources/ and update the <script> src below. -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/[email protected]/themes/github-dark.css"
        onerror="this.parentNode.removeChild(this)">
</head>
<body>
  <div id="root" class="markdown-body"></div>

  <script src="https://cdn.jsdelivr.net/npm/[email protected]/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/[email protected]/components/prism-core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/[email protected]/components/prism-clike.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/[email protected]/components/prism-javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/[email protected]/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/[email protected]/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/[email protected]/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/[email protected]/components/prism-swift.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/[email protected]/components/prism-typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/[email protected]/components/prism-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/[email protected]/components/prism-sql.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/[email protected]/components/prism-rust.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/[email protected]/components/prism-go.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/[email protected]/components/prism-markup-templating.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/[email protected]/mermaid.min.js"></script>

  <script>
    // Mermaid bootstrapping — on-demand only.
    var mmdInitialized = false;
    function ensureMermaid() {
      if (mmdInitialized || typeof mermaid === 'undefined') return;
      try {
        mermaid.initialize({
          startOnLoad: false,
          theme: 'dark',
          securityLevel: 'loose',
          fontFamily: '-apple-system, system-ui, sans-serif'
        });
        mmdInitialized = true;
      } catch (e) { console.warn('mermaid init failed', e); }
    }

    var _renderToken = 0;     // monotonic guard for re-entrant renders
    var _currentMermaid = []; // list of pending mermaid.render promises

    function render(md, theme) {
      var token = ++_renderToken;
      try {
        // Marked: GitHub-flavored markdown, no pedantic escapes, line breaks.
        if (typeof marked !== 'undefined') {
          marked.setOptions({ gfm: true, breaks: true, pedantic: false });
        }
        // Clear any in-flight mermaid renders from a prior call.
        _currentMermaid.forEach(function (p) { try { p.cancel && p.cancel(); } catch (e) {} });
        _currentMermaid = [];

        var root = document.getElementById('root');
        if (typeof marked === 'undefined') {
          root.textContent = md || '';
        } else {
          root.innerHTML = marked.parse(md || '');
        }

        // Syntax highlight every code block (filter out mermaid blocks).
        if (typeof Prism !== 'undefined') {
          root.querySelectorAll('pre code').forEach(function (b) {
            if (/language-mermaid/.test(b.className)) return;
            try { Prism.highlightElement(b); } catch (e) {}
          });
        }

        // Mermaid blocks: replace with a placeholder div, then render asynchronously.
        ensureMermaid();
        var mmdBlocks = [];
        root.querySelectorAll('pre code.language-mermaid').forEach(function (b, i) {
          mmdBlocks.push({ source: b.textContent, parent: b.parentElement });
        });
        if (mmdBlocks.length && typeof mermaid !== 'undefined') {
          mmdBlocks.forEach(function (entry, i) {
            var id = 'mmd-' + token + '-' + i;
            var div = document.createElement('div');
            div.id = id;
            div.className = 'mermaid-svg';
            entry.parent.replaceWith(div);
            var p = mermaid.render(id, entry.source);
            _currentMermaid.push(p);
            p.then(function (res) {
              if (token !== _renderToken) return;     // stale, ignore
              div.innerHTML = res.svg;
              reportHeight();
            }).catch(function (err) {
              div.innerHTML = '<pre class="mermaid-error">' + (err && err.message ? err.message : String(err)) + '</pre>';
              reportHeight();
            });
          });
        }

        // External `workspace://` links — wire to a native handler.
        root.querySelectorAll('a[href^="workspace://"]').forEach(function (a) {
          a.addEventListener('click', function (evt) {
            evt.preventDefault();
            var href = a.getAttribute('href');
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.linkTap) {
              window.webkit.messageHandlers.linkTap.postMessage(href);
            }
          });
        });

        reportHeight();
      } catch (e) {
        document.getElementById('root').textContent = (e && e.message) || String(e);
        reportHeight();
      }
    }

    function reportHeight() {
      if (!window.webkit || !window.webkit.messageHandlers || !window.webkit.messageHandlers.heightChange) return;
      var h = Math.max(document.documentElement.scrollHeight, document.body.scrollHeight);
      window.webkit.messageHandlers.heightChange.postMessage(h);
    }

    // Render an initial empty body so the height handler is primed.
    render('');
  </script>
</body>
</html>
